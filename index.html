    <style>
        :root { --primary: #ffea00; --primary-dark: #ccac00; --bg: #050505; --card: #121212; --text: #ffffff; --green: #00ff66; --red: #ff0000; --link: #88ccff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; position: relative; min-height: 100vh; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1500 0%, #050505 100%); z-index: -2; }
        .bg-glow { position: fixed; width: 100vw; height: 100vh; z-index: -1; top: 0; left: 0; pointer-events: none; }
        .particle { position: absolute; width: 2px; height: 15px; background: var(--primary); opacity: 0.2; animation: rain linear infinite; }
        @keyframes rain { 0% { transform: translateY(-100px); } 100% { transform: translateY(110vh); } }
        header { width: 100%; padding: 20px 0; background: rgba(18, 18, 18, 0.9); border-bottom: 2px solid var(--primary); text-align: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }

        button { background: linear-gradient(145deg, #fff200, #b8860b); color: #000; border: 1px solid #fff; padding: 12px; font-weight: 900; cursor: pointer; border-radius: 8px; font-size: 12px; text-transform: uppercase; transition: 0.3s; box-shadow: 0 0 10px rgba(255, 234, 0, 0.2); }

        .section-box { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; border: 1px solid #222; }
        .ref-container { margin: 10px 0; font-size: 11px; color: #aaa; text-align: left; display: flex; align-items: center; gap: 8px; border-top: 1px solid #333; padding-top: 10px; }
        .btn-copy-link { background: var(--primary); color: #000; padding: 4px 10px; border-radius: 5px; font-size: 9px; font-weight: 900; border: none; cursor: pointer; }
        .info-promo-box { background: rgba(20, 20, 20, 0.8); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: center; }

        .sala-card { background: #0a0a0a; border: 1px solid #333; border-radius: 6px; padding: 4px; text-align: center; cursor: pointer; transition: 0.3s; min-width: 35px; }
        .sala-card b { font-size: 8px; display: block; }
        .sala-card div { font-size: 7px; opacity: 0.8; }
        .sala-card.active { border-color: var(--primary); background: #2a2200; box-shadow: 0 0 10px rgba(255, 234, 0, 0.4); }
        .game-layout { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: flex-start; }
        .left-col { width: 320px; flex-shrink: 0; }
        .right-col { flex: 1; min-width: 300px; }
        #canvas-container { position: relative; margin: 0 auto; width: 300px; height: 300px; }
        #pointer { position: absolute; right: -5px; top: 50%; transform: translateY(-50%); width: 30px; height: 20px; background: #fff; clip-path: polygon(100% 0%, 0% 50%, 100% 100%); z-index: 10; transition: transform 0.1s ease-out; transform-origin: center right; }
        canvas { width: 300px !important; height: 300px !important; border-radius: 50%; border: 4px solid #222; }
        .numbers-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #000; padding: 10px; border-radius: 8px; max-height: 400px; overflow-y: auto; will-change: transform; }
        .num-btn { padding: 8px 0; font-size: 10px; border: 1px solid #333; background: #111; color: #fff; cursor: pointer; border-radius: 4px; transition: none; }
        .num-btn.selected { background: var(--green); color: #000; font-weight: bold; }
        .num-btn.taken { background: #ff0000 !important; color: #fff !important; cursor: not-allowed; pointer-events: none; opacity: 1; font-weight: bold; }
        .btn-rand { background: #222; color: #fff; border: 1px solid #444; padding: 8px; font-size: 10px; flex: 1; text-transform: none; }
        .btn-rand b { color: var(--primary); display: block; font-size: 11px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; }
        input, select { width: 90%; padding: 14px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; text-align: center; }
        .password-wrapper { position: relative; width: 90%; margin: 0 auto; }
        .eye-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; }
        .auth-links { margin-top: 15px; font-size: 12px; color: var(--link); cursor: pointer; text-decoration: underline; }
        .wallet-box { background: #111; border: 1px dashed var(--primary); padding: 10px; border-radius: 8px; font-size: 11px; word-break: break-all; margin: 10px 0; cursor: pointer; }
        .upload-box { border: 2px dashed #444; padding: 10px; margin: 10px 0; border-radius: 8px; cursor: pointer; background: #0a0a0a; font-size: 11px; }
        #preview-img { width: 100%; max-height: 100px; object-fit: contain; margin-top: 10px; display: none; }
        .admin-notif { background: #1a1a1a; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-size: 11px; border-left: 3px solid var(--primary); text-align: left; }
        footer { width: 100%; padding: 30px 0; background: #0a0a0a; border-top: 1px solid #222; text-align: center; color: #555; font-size: 12px; }
        .f-links { margin-top: 10px; display: flex; justify-content: center; gap: 15px; color: var(--link); cursor: pointer; }
        @media (max-width: 1100px) { .salas-grid { grid-template-columns: repeat(10, 1fr); } }
        @media (max-width: 600px) { .salas-grid { grid-template-columns: repeat(5, 1fr); } .left-col, .right-col { width: 100%; } }
    </style>
</head>
<body>

<div class="bg-glow" id="rain-container"></div>

<header>
    <div style="font-weight: 900; font-size: 26px; color: var(--primary);">🔱GLOBAL CASH TIME🔱</div>
    <div id="guest-btn" style="margin-top:10px;"><button onclick="openM('auth')" style="width:auto; padding:8px 30px;">LOGIN / REGISTRO</button></div>
</header>

<div class="main-container">
    <div id="user-profile" class="profile-card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div><span class="label-gold">CUENTA</span><div id="prof-name" style="font-weight:900; font-size: 20px;">---</div></div>
            <div style="text-align:right;"><span class="label-gold">SALDO</span><div id="prof-balance" style="color:var(--green); font-weight:900; font-size:24px;">$0.00</div></div>
        </div>

        <div style="display:flex; gap:4px; margin-top:15px; width: 100%; overflow-x: auto;">
            <button onclick="openM('dep')" style="flex:1; padding: 10px 5px; font-size: 10px; min-width: 80px;">DEPOSITAR</button>
            <button onclick="openM('with')" style="flex:1; padding: 10px 5px; font-size: 10px; min-width: 80px; background:var(--red); color:#fff;">RETIRAR</button>
            <button onclick="openM('ref')" style="flex:1; padding: 10px 5px; font-size: 10px; min-width: 80px; background:var(--link); color:#000;">REFERIDO</button>
            <button onclick="openM('hist')" style="flex:1; padding: 10px 5px; font-size: 10px; min-width: 80px; background:#444; color:#fff;">HISTORIAL</button>

        </div>

        <div class="ref-container">
            CÓDIGO: <span id="prof-ref" style="color:var(--primary); font-weight:900; margin-right: 5px;">---</span>
            <button class="btn-copy-link" onclick="copyRef()">COPIAR LINK</button>
        </div>

        <div id="admin-panel" style="display:none; margin-top:15px; border-top:1px solid #444; padding-top:10px;">
            <span class="label-gold">PANEL ADMIN</span>
            <div style="margin-top:10px; display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px;">
                <button onclick="renderAdmin()" style="font-size:9px;">NOTIF</button>
                <button onclick="renderUserDB()" style="font-size:9px;">DB</button>
                <button onclick="renderPassReqs()" style="font-size:9px;">CLAVES</button>
                <button onclick="resetSalasManual()" style="font-size:9px; background:red; color:white;">RESET</button>
            </div>
            <div id="pending-deps" style="margin-top:10px; max-height: 300px; overflow-y: auto;"></div>
        </div>
    </div>

    <div class="info-promo-box">
        <div class="promo-title">GANA $50 CON $0,50</div>
        <div class="promo-subtitle">3 ENTRE 200 | ¡Bienvenido!</div>
        <div class="promo-giros">
            <div class="giro-tag">G1: $5</div>
            <div class="giro-tag">G2: $15</div>
            <div class="giro-tag">G3: $50 🏆</div>
        </div>
    </div>

    <div class="salas-grid" id="grid-salas"></div>

    <div class="section-box game-layout">
        <div class="left-col">
            <h3 id="sala-txt" style="color:var(--primary); margin:0;">SALA #1</h3>
            <div id="canvas-container"><div id="pointer"></div><canvas id="wheel" width="600" height="600"></canvas></div>
            <p id="prog-txt" style="font-weight:bold; margin:10px 0 5px;">0 / 200 Vendidos</p>
            <div id="live-counter" style="color:var(--green); font-size: 18px; font-weight: 900; height: 25px;"></div>
            <p id="status-txt" style="color:var(--primary); font-weight:bold; min-height:1.2em;"></p>
            <button onclick="comprarSeleccion()" style="width:100%; height:50px; margin-bottom:10px; font-size:14px;">COMPRAR SELECCIONADOS</button>
            <div style="display:flex; gap:5px;">
                <button class="btn-rand" onclick="rand(5)"><b>5 Al.</b>$2.50</button>
                <button class="btn-rand" onclick="rand(15)"><b>15 Al.</b>$7.50</button>
                <button class="btn-rand" onclick="rand(25)"><b>25 Al.</b>$12.50</button>
            </div>

        <div class="right-col">

</div>

<footer>

        <span onclick="openM('faq')">FAQ</span>

    </div>
</footer>

<div id="modal" class="modal"><div id="modal-content" class="section-box" style="width:90%; max-width:380px;"></div></div>

<script>
let users = [], currentU = null, ang = 0, sSel = 0, mySelection = [], tempImg = "";
let pendingDeps = [], pendingWiths = [], passReqs = [], historial = []; 
let salas = Array.from({length: 50}, (_, i) => ({ id: i+1, count: 0, sold: [], isSpinning: false, isWaiting: false, waitStep: 0, currentGiro: 0, endTime: 0, lastWinner: null }));
const wheelNumbers = Array.from({length: 200}, (_, i) => i + 1).sort(() => Math.random() - 0.5); 
const PREMIOS = { 1: 5, 2: 15, 3: 50 };

window.onload = () => {
    createRain();
    const checkFirebase = setInterval(() => { if(window.db) { clearInterval(checkFirebase); initApp(); } }, 100);
};

function initApp() {
    window.dbOnValue(window.dbRef(window.db), (snapshot) => {
        const data = snapshot.val() || {};
        users = data.users || [];
        pendingDeps = data.pendingDeps || [];
        pendingWiths = data.pendingWiths || [];
        passReqs = data.passReqs || [];
        historial = data.historial || [];
        if(data.salas) salas = data.salas;
        
        const saved = localStorage.getItem('GCT_SESSION');
        if(saved) {
            if(saved === "ADMIN_GLOBAL") { currentU = {u:"ADMIN_GLOBAL", b:0}; document.getElementById('admin-panel').style.display='block'; }
            else { 
                currentU = users.find(x => x.user === saved || x.u === saved);
                if(currentU) {
                    document.getElementById('prof-balance').innerText = `$${currentU.b.toFixed(2)}`;
                    document.getElementById('prof-ref').innerText = currentU.user;
                }
            }
            if(currentU) showProfile();
        }
        sSel = parseInt(localStorage.getItem('GCT_S_SEL')) || 0;
        renderGrid(); renderNumbers();
        document.getElementById('sala-txt').innerText = `SALA #${salas[sSel]?.id || (sSel+1)}`;
        updateUI();
    });
    setInterval(logic, 30); draw();
}

function save() { window.dbSet(window.dbRef(window.db, "/"), { users, pendingDeps, pendingWiths, passReqs, historial, salas }); }

function logic() {
    const now = Date.now(); let change = false;
    salas.forEach((s, i) => {
        if(s.isSpinning) {
            let timeLeft = s.endTime - now;
            let duration = 15000; 
            let progress = Math.min(1, (duration - timeLeft) / duration);
            let speed = 0.5 * Math.pow(1 - progress, 2.5); 
            if(timeLeft <= 0 || speed <= 0.0001) {
                s.isSpinning = false; s.isWaiting = true; s.waitStep = 1; s.endTime = now + 5000; s.lastWinner = getWinningNumber();
                let winnerData = (s.sold || []).find(x => x.n === s.lastWinner);
                if(winnerData) { let wu = users.find(u => u.user === winnerData.u); if(wu) wu.b += PREMIOS[s.currentGiro]; }
                historial.push({ type:'win', u: winnerData?winnerData.u:'Nadie', sala: s.id, ganador: s.lastWinner, premio: PREMIOS[s.currentGiro], fecha: new Date().toLocaleString() });
                change = true;
            } else if(i === sSel) {
                ang += speed; 
                document.getElementById('live-counter').innerText = `SORTEANDO: ${getWinningNumber()}`;
                draw();
            }
        } else if(s.isWaiting && now >= s.endTime) {
            if(s.currentGiro < 3) { s.currentGiro++; s.isSpinning = true; s.endTime = now + 15000; s.isWaiting = false; }
            else { s.currentGiro = 0; s.count = 0; s.sold = []; s.lastWinner = null; s.isWaiting = false; }
            change = true;
        }
    });
    if(change) save();
}

function comprarSeleccion() { 
    if(!currentU) return openM('auth'); 
    let s = salas[sSel], cost = mySelection.length * 0.5; 
    if(s.isSpinning || s.isWaiting) return alert("Sorteo en curso");
    if(!mySelection.length) return alert("Selecciona números");
    if(currentU.b < cost) return alert("Saldo insuficiente");

    currentU.b -= cost;
    // Lógica de Referido Automática
    if(currentU.refBy) {
        currentU.refCount = (currentU.refCount || 0) + mySelection.length;
        if(currentU.refCount >= 20) {
            let boss = users.find(x => x.user === currentU.refBy);
            if(boss) { boss.b += 1; historial.push({type:'sys', u: boss.user, msg: `+1 USDT por referido ${currentU.user}`, fecha: new Date().toLocaleString()}); }
            currentU.refCount -= 20;
        }
    }

    let alias = currentU.user;
    if(!s.sold) s.sold = []; 
    mySelection.forEach(n => s.sold.push({n, u: alias})); 
    s.count = s.sold.length; 
    mySelection = [];
    if(s.count >= 200) { s.currentGiro = 1; s.isSpinning = true; s.endTime = Date.now() + 15000; } 
    save(); renderNumbers();
}

function openM(t) { 
    const c = document.getElementById('modal-content'); document.getElementById('modal').style.display='flex'; 
    if(t==='auth') { c.innerHTML = `<h3>LOGIN</h3><input id="li-u" placeholder="Usuario"><input id="li-p" type="password" placeholder="Clave"><button onclick="login()" style="width:100%">ENTRAR</button><div class="auth-links" onclick="openM('reg')">Registrarse</div>`; }
    else if(t==='reg') { 
        const urlParams = new URLSearchParams(window.location.search);
        const refVal = urlParams.get('ref') || "";
        c.innerHTML = `<h3>REGISTRO</h3><input id="re-user" placeholder="Usuario"><input id="re-u" placeholder="Gmail"><input id="re-p" type="password" placeholder="Clave (8+)" maxlength="15"><input id="re-ref" placeholder="Referido (Opcional)" value="${refVal}"><button onclick="register()" style="width:100%">CREAR CUENTA</button>`; 
    }
    else if(t==='ref') {
        let misRefs = users.filter(u => u.refBy === currentU.user).length;
        c.innerHTML = `<h3>SISTEMA DE REFERIDOS</h3><div style="font-size:11px; text-align:left;">
        <p>Gana $1 USDT cada vez que un referido tuyo participe 20 veces.</p>
        <p style="color:var(--primary)">Tus referidos registrados: <b>${misRefs}</b></p>
        <div class="wallet-box" onclick="copyRef()">LINK: globalcashtime.pro/?ref=${currentU.user}</div>
        </div>`;
    }
    else if(t==='dep') { c.innerHTML = `<h3>DEPOSITAR</h3><div class="wallet-box">TRC20: <b>TFtX2tLdjqTnTdVAUfQ8YNACv6QUAK9LAy</b></div><input id="dep-amt" type="number" placeholder="Monto"><div class="upload-box" onclick="document.getElementById('f-in').click()">+ COMPROBANTE<input type="file" id="f-in" hidden onchange="previewFile()"><img id="preview-img"></div><button onclick="notificarPago()" style="width:100%">ENVIAR</button>`; }
    else if(t==='with') { c.innerHTML = `<h3>RETIRAR</h3><input id="wi-amt" type="number" placeholder="Monto"><input id="wi-wallet" placeholder="Billetera TRC20"><button onclick="solicitarRetiro()" style="width:100%; background:var(--red); color:#fff;">RETIRAR</button>`; }
    else if(t==='hist') { 
        let currentAlias = currentU ? currentU.user : '';
        let histFiltered = historial.filter(h => h.u === currentAlias || (currentU && currentU.u === 'ADMIN_GLOBAL')).reverse();
        c.innerHTML = `<h3>HISTORIAL</h3><div style="max-height:200px; overflow-y:auto; font-size:10px; text-align:left;">` + 
        histFiltered.map(h => `<div style="border-bottom:1px solid #333; padding:5px;">${h.msg || h.type}: ${h.u} - ${h.fecha}</div>`).join('') + `</div>`; 
    }
    c.innerHTML += `<button onclick="closeM()" style="background:#444; margin-top:10px; width:100%;">CERRAR</button>`; 
}

function register() { 
    let usr = document.getElementById('re-user').value.trim(), u = document.getElementById('re-u').value.trim().toLowerCase(), p = document.getElementById('re-p').value, rb = document.getElementById('re-ref').value.trim(); 
    if(!usr || !u.endsWith("@gmail.com") || p.length < 8) return alert("Datos inválidos"); 
    if(users.find(x => x.user === usr)) return alert("Usuario ocupado");
    users.push({u, user: usr, p, b: 0, refBy: rb, refCount: 0}); save(); alert("Éxito"); openM('auth'); 
}

function login() { 
    let input = document.getElementById('li-u').value.trim(), p = document.getElementById('li-p').value; 
    if(input==="admin_global" && p==="CASH_TIME_2026") { localStorage.setItem('GCT_SESSION', "ADMIN_GLOBAL"); location.reload(); return; } 
    let user = users.find(x => (x.u === input || x.user === input) && x.p === p); 
    if(user) { localStorage.setItem('GCT_SESSION', user.user); location.reload(); } else alert("Error"); 
}

function copyRef() {
    const url = window.location.origin + "/?ref=" + currentU.user;
    navigator.clipboard.writeText(url).then(() => alert("¡Link copiado!"));
}

function getWinningNumber() { const normalizedAng = (ang % (Math.PI * 2) + (Math.PI * 2)) % (Math.PI * 2); const index = Math.floor(((Math.PI * 2 - normalizedAng) / (Math.PI * 2)) * 200) % 200; return wheelNumbers[index]; }
function draw() {
    const canvas = document.getElementById('wheel'), ctx = canvas.getContext('2d'), colors = ['#3366FF', '#FF3333', '#FFCC00', '#009933'], arc = (Math.PI*2)/200;
    ctx.clearRect(0,0,600,600);
    for(let i=0; i<200; i++) {
        const a = ang + i*arc; ctx.beginPath(); ctx.fillStyle = colors[i%4]; ctx.moveTo(300,300); ctx.arc(300,300,300, a, a+arc); ctx.fill();
        ctx.save(); ctx.translate(300,300); ctx.rotate(a+arc/2); ctx.fillStyle="#fff"; ctx.font="bold 8px Arial"; ctx.fillText(wheelNumbers[i], 265, 0); ctx.restore();
    }
}
function createRain() { const container = document.getElementById('rain-container'); for(let i=0; i<50; i++) { let p = document.createElement('div'); p.className = 'particle'; p.style.left = Math.random()*100+'vw'; p.style.animationDuration = (Math.random()*3+2)+'s'; container.appendChild(p); } }
function renderGrid() { const grid = document.getElementById('grid-salas'); grid.innerHTML = ""; salas.forEach((s, i) => { grid.innerHTML += `<div class="sala-card ${sSel===i?'active':''}" onclick="setSala(${i})"><b>SALA ${s.id}</b><div>${s.count}/200</div></div>`; }); }
function setSala(i) { sSel = i; localStorage.setItem('GCT_S_SEL', i); mySelection = []; document.getElementById('sala-txt').innerText = `SALA #${salas[i].id}`; renderNumbers(); }
function renderNumbers() { const cont = document.getElementById('num-selector'); const s = salas[sSel]; let taken = new Set((s.sold || []).map(x => x.n)); let sel = new Set(mySelection); let html = ""; for(let n=1; n<=200; n++) { let cls = taken.has(n)?'taken':(sel.has(n)?'selected':''); html += `<button class="num-btn ${cls}" onclick="${taken.has(n)?'':'toggleNum('+n+', this)'}">${n}</button>`; } cont.innerHTML = html; document.getElementById('prog-txt').innerText = `${s.count} / 200 Vendidos`; }
function toggleNum(n, btn) { if(mySelection.includes(n)) { mySelection = mySelection.filter(x => x !== n); btn.classList.remove('selected'); } else { mySelection.push(n); btn.classList.add('selected'); } }
function rand(n) { let s = salas[sSel]; mySelection = []; let taken = new Set((s.sold || []).map(x => x.n)); let av = []; for(let i=1; i<=200; i++) if(!taken.has(i)) av.push(i); for(let i=0; i<n && av.length>0; i++) mySelection.push(av.splice(Math.floor(Math.random()*av.length), 1)[0]); renderNumbers(); }
function showProfile() { document.getElementById('guest-btn').style.display='none'; document.getElementById('user-profile').style.display='block'; document.getElementById('prof-name').innerText = currentU.user; }
function logout() { localStorage.removeItem('GCT_SESSION'); location.reload(); }
function closeM() { document.getElementById('modal').style.display='none'; }
function previewFile() { const f = document.getElementById('f-in').files[0]; const r = new FileReader(); r.onloadend = () => { tempImg = r.result; document.getElementById('preview-img').src=tempImg; document.getElementById('preview-img').style.display='block'; }; if(f) r.readAsDataURL(f); }
function notificarPago() { let a = parseFloat(document.getElementById('dep-amt').value); if(a >= 5 && tempImg) { pendingDeps.push({ u: currentU.user, a: a, img: tempImg, id: Date.now() }); save(); closeM(); alert("Enviado"); } }
function solicitarRetiro() { let a = parseFloat(document.getElementById('wi-amt').value); if(a >= 10 && currentU.b >= a) { currentU.b -= a; pendingWiths.push({ u: currentU.user, a: a, wallet: document.getElementById('wi-wallet').value, fecha: new Date().toLocaleString() }); save(); closeM(); alert("Solicitado"); } }
function updateUI() { if(currentU && currentU.u !== "ADMIN_GLOBAL") { let live = users.find(x => x.user === currentU.user); if(live) { currentU.b = live.b; document.getElementById('prof-balance').innerText = `$${currentU.b.toFixed(2)}`; } } }
function renderAdmin() { const div = document.getElementById('pending-deps'); div.innerHTML = "<h4>NOTIF</h4>"; pendingDeps.forEach((p, idx) => { div.innerHTML += `<div class="admin-notif">${p.u}($${p.a})<br><button onclick="aprobar(${idx})">SI</button></div>`; }); }
function aprobar(idx) { let p = pendingDeps[idx]; let u = users.find(x => x.user === p.u); if(u) u.b += p.a; pendingDeps.splice(idx, 1); save(); }
function resetSalasManual() { if(confirm("¿Reset?")) { salas.forEach(s => { s.count=0; s.sold=[]; s.currentGiro=0; s.isSpinning=false; }); save(); location.reload(); } }
</script>
