<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLOBAL CASH TIME | Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCntjKiPwfoCq0MzHIkybX4VZuYE_ZCnOE",
            authDomain: "globalcash-6fbe8.firebaseapp.com",
            databaseURL: "https://globalcash-6fbe8-default-rtdb.firebaseio.com",
            projectId: "globalcash-6fbe8",
            storageBucket: "globalcash-6fbe8.firebasestorage.app",
            messagingSenderId: "476476155798",
            appId: "1:476476155798:web:947a0e0140acfca78d5fb7",
            measurementId: "G-4L6LQ3ZL7S"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbOnValue = onValue;
        window.dbUpdate = update;
    </script>

    <style>
        :root { --primary: #ffea00; --primary-dark: #ccac00; --bg: #050505; --card: #121212; --text: #ffffff; --green: #00ff66; --red: #ff0000; --link: #88ccff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; position: relative; min-height: 100vh; }
        header { width: 100%; padding: 20px 0; background: rgba(18, 18, 18, 0.9); border-bottom: 2px solid var(--primary); text-align: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .main-container { width: 95%; max-width: 1200px; padding: 10px; box-sizing: border-box; flex-grow: 1; }
        button { background: linear-gradient(145deg, #fff200, #b8860b); color: #000; border: 1px solid #fff; padding: 12px; font-weight: 900; cursor: pointer; border-radius: 8px; font-size: 12px; text-transform: uppercase; transition: 0.3s; }
        .profile-card { display: none; background: linear-gradient(145deg, #1a1a1a, #0a0800); border: 2px solid var(--primary); padding: 15px; border-radius: 15px; margin: 0 auto 20px; width: 100%; max-width: 480px; }
        .label-gold { color: var(--primary); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .section-box { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; border: 1px solid #222; }
        .salas-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-bottom: 20px; overflow-x: auto; }
        .sala-card { background: #0a0a0a; border: 1px solid #333; border-radius: 6px; padding: 4px; text-align: center; cursor: pointer; min-width: 45px; }
        .sala-card.active { border-color: var(--primary); background: #2a2200; }
        .numbers-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #000; padding: 10px; border-radius: 8px; max-height: 400px; overflow-y: auto; }
        .num-btn { padding: 8px 0; font-size: 10px; border: 1px solid #333; background: #111; color: #fff; border-radius: 4px; }
        .num-btn.selected { background: var(--green); color: #000; }
        .num-btn.taken { background: #ff0000 !important; cursor: not-allowed; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; }
        .admin-notif { background: #1a1a1a; padding: 10px; margin-bottom: 10px; border-radius: 5px; font-size: 11px; border-left: 3px solid var(--primary); text-align: left; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; font-size: 26px; color: var(--primary);">🔱GLOBAL CASH TIME🔱</div>
    <div id="guest-btn" style="margin-top:10px;"><button onclick="openM('auth')">LOGIN / REGISTRO</button></div>
</header>

<div class="main-container">
    <div id="user-profile" class="profile-card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div><span class="label-gold">CUENTA</span><div id="prof-name">---</div></div>
            <div style="text-align:right;"><span class="label-gold">SALDO</span><div id="prof-balance" style="color:var(--green); font-weight:900;">$0.00</div></div>
        </div>
        <div style="display:flex; gap:5px; margin-top:15px;">
            <button onclick="openM('dep')" style="flex:1;">DEPOSITAR</button>
            <button onclick="logout()" style="flex:1; background:#333; color:#fff;">SALIR</button>
        </div>
        <div id="admin-panel" style="display:none; margin-top:15px; border-top:1px solid #444; padding-top:10px;">
            <span class="label-gold">ADMIN PANEL</span>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;">
                <button onclick="renderUserDB()">VER USUARIOS</button>
                <button onclick="resetSalasManual()" style="background:red; color:white;">RESET SALAS</button>
            </div>
            <div id="admin-content" style="margin-top:10px; max-height: 300px; overflow-y: auto;"></div>
        </div>
    </div>

    <div class="salas-grid" id="grid-salas"></div>

    <div class="section-box">
        <h3 id="sala-txt">SALA #1</h3>
        <p id="prog-txt">0 / 200 Vendidos</p>
        <div class="numbers-grid" id="num-selector"></div>
        <button onclick="comprarSeleccion()" style="width:100%; margin-top:20px;">COMPRAR SELECCIONADOS</button>
    </div>
</div>

<div id="modal" class="modal"><div id="modal-content" class="section-box" style="width:90%; max-width:380px;"></div></div>

<script>
let users = [], currentU = null, sSel = 0, mySelection = [];
let salas = Array.from({length: 50}, (_, i) => ({ id: i+1, count: 0, sold: [] }));

window.onload = () => {
    const checkFirebase = setInterval(() => {
        if(window.db) { clearInterval(checkFirebase); initApp(); }
    }, 100);
};

function initApp() {
    window.dbOnValue(window.dbRef(window.db), (snapshot) => {
        const data = snapshot.val() || {};
        users = data.users || [];
        if(data.salas) salas = data.salas;

        const saved = localStorage.getItem('GCT_SESSION');
        if(saved) {
            if(saved === "ADMIN_GLOBAL") {
                currentU = {u: "ADMIN_GLOBAL"};
                document.getElementById('admin-panel').style.display = 'block';
            } else {
                currentU = users.find(u => u.u === saved);
            }
            if(currentU) showProfile();
        }
        renderGrid();
        renderNumbers();
    });
}

function save() { window.dbSet(window.dbRef(window.db), { users, salas }); }

function openM(t) {
    const c = document.getElementById('modal-content');
    document.getElementById('modal').style.display='flex';
    if(t==='auth') {
        c.innerHTML = `<h3>LOGIN</h3><input id="li-u" placeholder="Correo"><input id="li-p" type="password" placeholder="Clave"><button onclick="login()" style="width:100%">ENTRAR</button><button onclick="openM('reg')" style="margin-top:10px; background:none; color:white; border:none;">Registrarse</button>`;
    } else if(t==='reg') {
        c.innerHTML = `<h3>REGISTRO</h3><input id="re-u" placeholder="Correo"><input id="re-p" type="password" placeholder="Clave"><button onclick="register()" style="width:100%">CREAR CUENTA</button>`;
    }
}

function login() {
    let u = document.getElementById('li-u').value.trim().toLowerCase();
    let p = document.getElementById('li-p').value;
    if(u === "admin_global" && p === "CASH_TIME_2026") {
        localStorage.setItem('GCT_SESSION', "ADMIN_GLOBAL");
        location.reload();
    } else {
        let found = users.find(x => x.u === u && x.p === p);
        if(found) { localStorage.setItem('GCT_SESSION', u); location.reload(); }
        else alert("Datos incorrectos");
    }
}

function register() {
    let u = document.getElementById('re-u').value.trim().toLowerCase();
    let p = document.getElementById('re-p').value;
    if(u && p.length >= 4) {
        if(users.find(x => x.u === u)) return alert("Ya existe");
        users.push({u, p, b: 0});
        save();
        alert("Registrado");
        openM('auth');
    }
}

function showProfile() {
    document.getElementById('guest-btn').style.display='none';
    document.getElementById('user-profile').style.display='block';
    document.getElementById('prof-name').innerText = currentU.u;
    if(currentU.u !== "ADMIN_GLOBAL") document.getElementById('prof-balance').innerText = `$${currentU.b.toFixed(2)}`;
}

function renderGrid() {
    const grid = document.getElementById('grid-salas');
    grid.innerHTML = "";
    salas.forEach((s, i) => {
        grid.innerHTML += `<div class="sala-card ${sSel===i?'active':''}" onclick="setSala(${i})"><b>SALA ${s.id}</b><div>${s.count}/200</div></div>`;
    });
}

function setSala(i) { sSel = i; renderGrid(); renderNumbers(); }

function renderNumbers() {
    const cont = document.getElementById('num-selector');
    cont.innerHTML = "";
    let s = salas[sSel];
    let taken = (s.sold || []).map(x => x.n);
    for(let n=1; n<=200; n++) {
        let isSold = taken.includes(n);
        let isSel = mySelection.includes(n);
        cont.innerHTML += `<button class="num-btn ${isSold?'taken':''} ${isSel?'selected':''}" onclick="${!isSold ? `toggleNum(${n})` : ''}">${n}</button>`;
    }
    document.getElementById('prog-txt').innerText = `${s.count} / 200 Vendidos`;
    document.getElementById('sala-txt').innerText = `SALA #${s.id}`;
}

function toggleNum(n) {
    if(mySelection.includes(n)) mySelection = mySelection.filter(x => x !== n);
    else mySelection.push(n);
    renderNumbers();
}

function renderUserDB() {
    const div = document.getElementById('admin-content');
    div.innerHTML = "<h4>LISTA DE USUARIOS</h4>";
    users.forEach((u, idx) => {
        div.innerHTML += `<div class="admin-notif">
            <b>${u.u}</b> | Clave: ${u.p} | Saldo: $${u.b}
            <br><button onclick="editBal(${idx}, 10)">+ $10</button> <button onclick="editBal(${idx}, -10)">- $10</button>
        </div>`;
    });
}

function editBal(idx, amt) { users[idx].b += amt; save(); }
function logout() { localStorage.removeItem('GCT_SESSION'); location.reload(); }
function closeM() { document.getElementById('modal').style.display='none'; }
function resetSalasManual() { salas.forEach(s => { s.count=0; s.sold=[]; }); save(); alert("Reseteado"); }
</script>
</body>
</html>
